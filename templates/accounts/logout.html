{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto text-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Logout</h2>
    <p class="text-gray-600 mb-6">Are you sure you want to logout?</p>
    <div class="flex gap-3">
      <a href="{% url 'sacco:dashboard' %}" class="btn-secondary flex-1">Cancel</a>
      <form method="post" action="{% url 'accounts:logout' %}" class="flex-1">
        {% csrf_token %}
        <button type="submit" class="btn-primary w-full">Logout</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
